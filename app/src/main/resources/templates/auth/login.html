<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::div})}">
<head>
    <title>ログイン - 汎用システム</title>
</head>
<body>
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="card-title mb-0 text-center">ログイン</h5>
            </div>
            <div class="card-body p-4">
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">メールアドレス</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="example@email.com">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">パスワード</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid shadow-sm mb-3">
                        <button type="submit" class="btn btn-primary">ログイン</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a th:href="@{/register}" class="text-decoration-none">新規アカウント作成はこちら</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
