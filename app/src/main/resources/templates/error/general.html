<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>システムエラー</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="alert alert-danger" role="alert">
    <h4 class="alert-heading">処理中にエラーが発生しました</h4>

    <p class="fs-5" th:text="${errorMessage}">ここにエラーメッセージが表示されます。</p>

    <hr>
    <p class="mb-0">お手数ですが、入力内容を確認のうえ、再度やり直してください。</p>

    <div class="mt-4">
        <a th:href="@{/transactions}" class="btn btn-outline-danger">取引一覧に戻る</a>
    </div>
</div>

</body>
</html>
