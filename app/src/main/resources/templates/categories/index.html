<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::div})}">
<head>
    <title>カテゴリ管理 - 汎用システム</title>
</head>
<body>
<div class="row">
    <div class="col-md-6">
        <h3 class="h3 mb-4 text-gray-800">カテゴリマスタ管理</h3>

        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/categories}" method="post">
                    <label for="categoryName" class="form-label font-weight-bold">新規カテゴリ追加</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="categoryName" name="name" required placeholder="例: 食費、通信費など">
                        <button class="btn btn-success" type="submit">追加</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>カテゴリ名</th>
                        <th class="text-center" style="width: 25%">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.name}"></td>
                        <td class="text-center">
                            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post" class="m-0" onsubmit="return confirm('このカテゴリを削除しますか？');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="2" class="text-center text-muted py-3">カテゴリが登録されていません。</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
</body>
</html>
