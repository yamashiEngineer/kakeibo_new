spring.application.name=demo

# データベース接続設定 (Docker上のMySQL 3306ポートに接続)
spring.datasource.url=jdbc:mysql://localhost:3306/kakeibo_db?serverTimezone=Asia/Tokyo&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=kakeibo_user
spring.datasource.password=kakeibo_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernateの設定
# ↓開発環境向けにupdateにしておく
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true